name: smartussd
description: Modern offline USSD banking assistant for simplified banking in low-connectivity regions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  sqflite: ^2.3.0
  path: ^1.8.3
  url_launcher: ^6.2.2
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.1.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
